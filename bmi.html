<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#2f2f2f;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:350px;
      background:#6c6c6c;
      padding:20px;
      border-radius:5px;
    }

    .navbar{
      display:flex;
      gap:10px;
      margin-bottom:30px;
    }

    .navbar a{
      text-decoration:none;
      background:white;
      color:black;
      padding:8px 15px;
      border-radius:4px;
      border:1px solid black;
      font-size:14px;
    }

    h2{
      margin-bottom:25px;
      color:black;
    }

    .input-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:black;
      font-weight:bold;
    }

    input{
      width:120px;
      padding:6px;
      border:none;
      outline:none;
    }

    button{
      padding:8px 20px;
      font-size:18px;
      margin-top:10px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-weight:bold;
    }

    #result{
      margin-top:20px;
      font-size:20px;
      color:black;
      font-weight:bold;
    }

    .guide{
      margin-top:30px;
      color:black;
    }

    .guide h3{
      margin-bottom:15px;
    }

    .guide p{
      margin-bottom:10px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="navbar">
      <a href="#">Home</a>
      <a href="#">Youtube channel</a>
    </div>

    <h2>BMI Calculator</h2>

    <form>

      <div class="input-group">
        <label>Height in CM:</label>
        <input type="text" id="height">
      </div>

      <div class="input-group">
        <label>Weight in KG:</label>
        <input type="text" id="weight">
      </div>

      <button type="submit">Calculate</button>

      <div id="result"></div>

    </form>

    <div class="guide">

      <h3>BMI Weight Guide</h3>

      <p>Under Weight = Less than 18.6</p>
      <p>Normal Range = 18.6 and 24.9</p>
      <p>Overweight = Greater than 24.9</p>

    </div>

  </div>

  <script src="calc.js"></script>

</body>
</html>
